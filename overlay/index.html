<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css?family=Luckiest Guy" rel="stylesheet">
    <title>Angel's Who's that pokemon</title>
    <style>
        body {
            margin: 0;
            background: transparent;
            font-family: 'Luckiest Guy';font-size: 22px;
            color: white;
            text-align: center;
            overflow: hidden;
            text-shadow: 5px 5px 8px black;
        }

        #title {
            font-size: 60px;
            margin-top: 40px;
            text-shadow: 10px 10px 20px black;
        }

        #pokemon {
            width: 450px;
            height: auto;
            display: none;
            margin: 20px auto 0 auto;
            filter:
               brightness(0)
                drop-shadow(0 0 4px white)
                drop-shadow(0 0 8px white)
                drop-shadow(0 0 16px white);
}

        #pokemon.revealed {
            filter:
                drop-shadow(0 0 6px white);
        }

        #winner {
            display: none;
            margin-top: 20px;
            font-size: 40px;
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px 6px black;
        }

    </style>
</head>
<body>
    <h1 id="title">Who's That Pokémon?</h1>
    <img id="pokemon" src="" alt="Pokemon silhouette">
    <div id="winner"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const img = document.getElementById("pokemon");
        const title = document.getElementById("title");
        const winner = document.getElementById("winner");

        socket.on("newPokemon", (pokemon) => {
            console.log("New Pokémon received:", pokemon);
            img.src = pokemon.image;
            img.classList.remove("revealed");
            img.style.display = "block";
            title.textContent = "Who's That Pokémon?";
            winner.style.display = "none";
            winner.textContent = "";
        });
        socket.on("revealPokemon", (pokemon) => {
            img.classList.add("revealed");
            title.textContent = `It's ${pokemon.displayName}!`;

            if (pokemon.winner) {
                winner.textContent = `${pokemon.winner} guessed correctly!`;
            } else {
                winner.textContent = "Round skipped!";
            }

            winner.style.display = "block";
        });
        socket.on("clearPokemon", () => {
            img.style.display = "none";
            img.classList.remove("revealed");
            title.textContent = "Who's That Pokémon?";
            winner.style.display = "none";
            winner.textContent = "";
        });
    </script>
</body>
</html>
